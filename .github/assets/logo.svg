<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">s3mirror</title>
  <desc id="desc">S3-compatible bucket mirroring for automation-friendly storage operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="bucketSource" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="bucketTarget" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="transfer" x1="650" y1="178" x2="1014" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0 L0 0 0 42" fill="none" stroke="#94a3b8" stroke-width="0.7" opacity="0.15"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="138%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 82px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 600 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .label { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e2e8f0; letter-spacing: 0.9px; }
      .mono { font: 500 16px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #cbd5e1; letter-spacing: 0; }
      .muted { fill: #94a3b8; }
      .blue { fill: #38bdf8; }
      .green { fill: #34d399; }
      .orange { fill: #fb923c; }
      .purple { fill: #a78bfa; }
      .draw { stroke-dasharray: 10 12; animation: dash 8s linear infinite; }
      .pulse { animation: pulse 3.6s ease-in-out infinite; transform-origin: center; }
      @keyframes dash { to { stroke-dashoffset: -220; } }
      @keyframes pulse { 0%, 100% { opacity: 0.48; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <circle cx="155" cy="78" r="185" fill="url(#glowA)"/>
  <circle cx="1028" cy="302" r="230" fill="url(#glowB)"/>
  <path d="M0 292 C170 255 250 328 430 292 C610 256 710 226 890 264 C1040 296 1100 244 1200 226 L1200 360 L0 360 Z" fill="url(#accent)" opacity="0.16"/>

  <g opacity="0.95" filter="url(#softGlow)">
    <path class="draw" d="M654 90 C742 52 804 94 874 152 C938 205 1008 190 1088 148" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.52"/>
    <path class="draw" d="M670 272 C754 214 840 222 920 260 C1008 302 1046 252 1106 226" fill="none" stroke="#f97316" stroke-width="2" opacity="0.42"/>
    <circle class="pulse" cx="874" cy="152" r="5" fill="#8b5cf6"/>
    <circle class="pulse" cx="1088" cy="148" r="5" fill="#38bdf8"/>
    <circle class="pulse" cx="670" cy="272" r="5" fill="#f97316"/>
    <circle class="pulse" cx="920" cy="260" r="5" fill="#8b5cf6"/>
    <circle class="pulse" cx="1106" cy="226" r="5" fill="#f97316"/>
  </g>

  <g transform="translate(66 68)">
    <rect x="0" y="0" width="112" height="30" rx="15" fill="#0f766e" opacity="0.26"/>
    <text x="18" y="20" class="label">NETSPEEDY</text>
    <text x="0" y="104" class="title">s3mirror</text>
    <text x="3" y="146" class="subtitle">Automation-friendly S3 bucket mirroring</text>
    <rect x="3" y="175" width="510" height="3" rx="2" fill="url(#accent)"/>
    <text x="3" y="215" class="mono"><tspan class="blue">copy</tspan><tspan class="muted"> | </tspan><tspan class="green">diff</tspan><tspan class="muted"> | </tspan><tspan class="purple">parallel</tspan><tspan class="muted"> | </tspan><tspan class="orange">guarded deletes</tspan></text>
  </g>

  <g transform="translate(632 72)" filter="url(#shadow)">
    <rect x="0" y="0" width="500" height="224" rx="22" fill="url(#panel)" opacity="0.92" stroke="#334155"/>
    <rect x="0" y="0" width="500" height="40" rx="22" fill="#0f172a" stroke="#334155"/>
    <rect x="0" y="0" width="500" height="3" rx="2" fill="url(#accent)"/>
    <circle cx="24" cy="21" r="5" fill="#f87171"/>
    <circle cx="45" cy="21" r="5" fill="#fbbf24"/>
    <circle cx="66" cy="21" r="5" fill="#34d399"/>
    <text x="94" y="27" class="mono muted">mirror-session</text>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M62 88 C62 72 86 60 116 60 C146 60 170 72 170 88 L170 166 C170 182 146 194 116 194 C86 194 62 182 62 166 Z" fill="#020617" stroke="url(#bucketSource)" stroke-width="7"/>
      <path d="M62 88 C62 104 86 116 116 116 C146 116 170 104 170 88" stroke="url(#bucketSource)" stroke-width="7"/>
      <path d="M72 132 C83 142 98 147 116 147 C134 147 149 142 160 132" stroke="#5eead4" stroke-width="4" opacity="0.48"/>

      <path d="M330 88 C330 72 354 60 384 60 C414 60 438 72 438 88 L438 166 C438 182 414 194 384 194 C354 194 330 182 330 166 Z" fill="#020617" stroke="url(#bucketTarget)" stroke-width="7"/>
      <path d="M330 88 C330 104 354 116 384 116 C414 116 438 104 438 88" stroke="url(#bucketTarget)" stroke-width="7"/>
      <path d="M340 132 C351 142 366 147 384 147 C402 147 417 142 428 132" stroke="#7dd3fc" stroke-width="4" opacity="0.48"/>

      <path d="M190 126 H312" stroke="url(#accent)" stroke-width="7"/>
      <path d="M296 110 L314 126 L296 142" stroke="#fbbf24" stroke-width="7"/>
      <path d="M310 156 H188" stroke="#475569" stroke-width="4" opacity="0.85"/>
      <path d="M204 143 L186 156 L204 169" stroke="#475569" stroke-width="4" opacity="0.85"/>
    </g>
  </g>
</svg>
