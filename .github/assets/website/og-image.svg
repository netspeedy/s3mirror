<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="s3mirror — mirror buckets and objects between S3-compatible endpoints">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1218"/>
      <stop offset="1" stop-color="#0a0d13"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="38%" r="55%">
      <stop offset="0" stop-color="#18a8ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#18a8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bucket" x1="0" y1="0" x2="1" y2="1">
