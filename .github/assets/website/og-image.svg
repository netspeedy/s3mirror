    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#18a8ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#18a8ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="628.5" fill="none" stroke="#2d3d52" stroke-opacity="0.55"/>

  <g transform="translate(96 188)">
    <g fill="none" stroke="url(#bucket)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="44" cy="22" rx="22" ry="8"/>
      <path d="M22 22 L30 96 L80 96 L88 22"/>
      <ellipse cx="132" cy="22" rx="22" ry="8"/>
      <path d="M110 22 L118 96 L168 96 L176 22"/>
