name: Lint (Pull Requests)

on:
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Pylint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install black isort pylint

    - name: Run pylint
      run: |
        echo "Running pylint..."
        pylint s3mirror.py

    - name: Check formatting (black)
      run: |
        echo "Checking black formatting..."
        black --check s3mirror.py

    - name: Check imports (isort)
      run: |
        echo "Checking import ordering..."
        isort --check-only s3mirror.py

  website:
    name: Website Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: .github/assets/website/package-lock.json

    - name: Install website dependencies
      run: npm ci --prefix .github/assets/website

    - name: Check website contract
      run: make website-check

    - name: Build website
      run: make website-build

  success:
    name: Lint Passed
    runs-on: ubuntu-latest
    needs:
      - lint
      - website
    if: success()

    steps:
    - name: Success
      run: echo "All linting checks passed."
