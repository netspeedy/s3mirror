name: Container Image

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_ref:
        description: Stable release tag to publish, for example v1.0.0
        required: false
        type: string

concurrency:
  group: container-image-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  verify-release-tag:
    name: Verify Release Tag
    if: |
      (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc.')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v') && !contains(inputs.release_ref || '', '-rc.'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Ensure release tag points to main
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          default_branch="${DEFAULT_BRANCH}"
          release_commit="$(git rev-parse HEAD^0)"

          git fetch origin "${default_branch}:refs/remotes/origin/${default_branch}" --force
          git merge-base --is-ancestor "${release_commit}" "refs/remotes/origin/${default_branch}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Verify app version matches release tag
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          expected_version="${RELEASE_REF#v}"
          app_version="$(python s3mirror.py --version | sed -E 's/^S3 Mirror v//')"

          if [ "${app_version}" != "${expected_version}" ]; then
            printf 'release tag %s does not match app version %s\n' "${RELEASE_REF}" "${app_version}" >&2
            exit 1
          fi

  publish:
    name: Publish GHCR Image
    if: |
      (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc.')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v') && !contains(inputs.release_ref || '', '-rc.'))
    needs:
      - verify-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_REF }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_REF }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_REF }}
            type=raw,value=latest

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Write workflow summary
        run: |
          {
            echo "Published container image:"
            echo
            echo '```text'
            printf '%s\n' "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
